<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Toy Menu App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Welcome to My Home Restaurant</h1>

    <div class="lang-switch">
        <button data-lang="en">English</button>
        <button data-lang="zh" class="active">中文</button>
    </div>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="menu-search" placeholder="Search for a dish...">
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Brunch">Brunch</button>
            
            <div class="dropdown">
                <button class="filter-btn" data-filter="Dinner">Dinner</button>
                <div class="dropdown-content">
                    <button class="filter-btn" data-filter="Mains">Mains</button>
                    <button class="filter-btn" data-filter="Sides">Sides</button>
                </div>
            </div>

            <button class="filter-btn" data-filter="Dessert">Dessert</button>
            <button class="filter-btn" data-filter="Drinks">Drinks</button>
            <button class="filter-btn" data-filter="Seasonal specials">Seasonal specials</button>
        </div>
    </div>

    <div id="menu-container"></div>

    <script type="module" src="script.js"></script>

</body>
</html>
